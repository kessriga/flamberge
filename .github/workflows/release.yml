name: Release

# Tag a commit `vX.Y.Z` and push it to build optimized per-platform `flamberge`
# binaries and attach them to the GitHub release for that tag, alongside Linux
# `.deb`/`.rpm` packages and an aggregate `SHA256SUMS`. A tag push also publishes
# the workspace to crates.io (when a token is configured). `workflow_dispatch`
# runs the same build matrix (for smoke-testing the packaging) but skips every
# upload/publish step, since there is no tag to attach assets to.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p flamberge-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging="flamberge-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/flamberge" "$staging/"
          cp README.md LICENSE "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          staging="flamberge-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/flamberge.exe" "$staging/"
          cp README.md LICENSE "$staging/"
          7z a "$staging.zip" "$staging"
          echo "ASSET=$staging.zip" >> "$GITHUB_ENV"

      # Linux distro packages. cargo-deb / cargo-generate-rpm consume the binary
      # already built above (`--no-build`) and read their layout from the
      # `[package.metadata.deb]` / `[package.metadata.generate-rpm]` tables in
      # crates/flamberge-cli/Cargo.toml. `.deb`/`.rpm` carry their own version in
      # the filename, so no per-tag renaming is needed for a stable asset name.
      - name: Build .deb and .rpm (linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          # cargo-deb/generate-rpm read from target/release; the matrix build
          # above targeted an explicit triple, so re-expose it at target/release.
          cargo build --release --locked -p flamberge-cli
          cargo install cargo-deb cargo-generate-rpm --locked
          deb=$(cargo deb --no-build -p flamberge-cli 2>/dev/null | tail -1)
          cargo generate-rpm -p crates/flamberge-cli
          rpm=$(ls target/generate-rpm/*.rpm | head -1)
          cp "$deb" "$rpm" .
          {
            echo "DEB_ASSET=$(basename "$deb")"
            echo "RPM_ASSET=$(basename "$rpm")"
          } >> "$GITHUB_ENV"

      - name: Attach binaries to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

      - name: Attach .deb/.rpm to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.target == 'x86_64-unknown-linux-gnu'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.DEB_ASSET }}
            ${{ env.RPM_ASSET }}
          fail_on_unmatched_files: true

  # Aggregate every attached asset into a single `SHA256SUMS`, the conventional
  # verification file that Homebrew/winget/mise `ubi` and end users can consume.
  # Runs after the whole matrix so every asset already exists on the release.
  checksums:
    name: SHA256SUMS
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate checksums from release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir dl && cd dl
          # Pull every asset except a pre-existing SHA256SUMS (idempotent re-runs).
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.tar.gz' --pattern '*.zip' \
            --pattern '*.deb' --pattern '*.rpm' --clobber
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
          gh release upload "$TAG" SHA256SUMS --repo "$GITHUB_REPOSITORY" --clobber

  # Publish the workspace to crates.io in dependency order. Skips cleanly (no
  # failure) until the maintainer adds a CARGO_REGISTRY_TOKEN secret — a secret
  # cannot be referenced in a job-level `if:`, so the guard lives in the step.
  publish-crates:
    name: crates.io
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: cargo publish (crypto -> formats -> keys -> schemes -> cli)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::notice::CARGO_REGISTRY_TOKEN not set; skipping crates.io publish."
            exit 0
          fi
          for crate in flamberge-crypto flamberge-formats flamberge-keys flamberge-schemes flamberge-cli; do
            echo "== publishing $crate =="
            # cargo blocks until each crate is index-visible before returning,
            # so the next (dependent) crate resolves its just-published dep.
            cargo publish -p "$crate" --locked
          done
