project_name: "DeDRM"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["cargo build succeeds with no warnings", "cargo test passes (unit and integration)", "cargo clippy passes with no warnings", "no panic!/unwrap/expect on non-test code paths", "behavior matches docs/DEDRM_SCHEMES.md and code cites the relevant section", "public items have doc comments"]
date_format: yyyy-mm-dd
max_column_width: 20
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
filesystem_only: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
